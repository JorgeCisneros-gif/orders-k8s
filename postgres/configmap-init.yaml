    -- Orden 7: ERROR E-02 — monto_total incorrecto
    -- monto declarado: 5000.00, real: 2650.00
    INSERT INTO orden (id_cliente, monto_total, cantidad_producto, estado, id_empleado, update_id_empleado)
    VALUES (7, 5000.00, 2, 'CERRADO', 2, 3);  -- ← E-02: monto incorrecto
    INSERT INTO detalle_orden VALUES (7, 1, 1, 2500.00), (7, 2, 1, 150.00);

    -- Orden 8: ERROR E-01 + E-02 — cantidad Y monto incorrectos
    INSERT INTO orden (id_cliente, monto_total, cantidad_producto, estado, id_empleado)
