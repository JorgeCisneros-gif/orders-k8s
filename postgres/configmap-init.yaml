apiVersion: v1
data:
  schema.sql: |
    -- ============================================================
    -- orders_db schema
    -- ============================================================

    CREATE TABLE IF NOT EXISTS cliente (
        id               BIGSERIAL PRIMARY KEY,
        nombre           VARCHAR(150) NOT NULL,
        correo           VARCHAR(150) NOT NULL UNIQUE,
        nro_telefono     VARCHAR(20),
        tipo_documento   VARCHAR(10)  NOT NULL,
        numero_documento VARCHAR(20)  NOT NULL UNIQUE
    );

    CREATE TABLE IF NOT EXISTS empleado (
        id               BIGSERIAL PRIMARY KEY,
        nombre           VARCHAR(150) NOT NULL,
        correo           VARCHAR(150) NOT NULL UNIQUE,
        nro_telefono     VARCHAR(20),
        tipo_documento   VARCHAR(10)  NOT NULL,
        numero_documento VARCHAR(20)  NOT NULL UNIQUE,
        rol              VARCHAR(50)  NOT NULL
    );

    CREATE TABLE IF NOT EXISTS producto (
        id               BIGSERIAL PRIMARY KEY,
        nombre           VARCHAR(200) NOT NULL,
        costo_unitario   NUMERIC(10,2) NOT NULL,
        detalle_producto TEXT
    );

    CREATE TABLE IF NOT EXISTS orden (
        nro_orden           BIGSERIAL PRIMARY KEY,
        id_cliente          BIGINT        NOT NULL REFERENCES cliente(id),
        monto_total         NUMERIC(12,2) NOT NULL,
        cantidad_producto   INTEGER       NOT NULL,
        estado              VARCHAR(20)   NOT NULL,
        fecha_creacion      TIMESTAMPTZ   DEFAULT now(),
        fecha_update        TIMESTAMPTZ   DEFAULT now(),
        id_empleado         BIGINT        REFERENCES empleado(id),
        update_id_empleado  BIGINT        REFERENCES empleado(id)
    );

    CREATE TABLE IF NOT EXISTS detalle_orden (
        nro_orden   BIGINT        NOT NULL REFERENCES orden(nro_orden),
        id_producto BIGINT        NOT NULL REFERENCES producto(id),
        cantidad    INTEGER       NOT NULL,
        total       NUMERIC(12,2) NOT NULL,
        PRIMARY KEY (nro_orden, id_producto)
    );

    -- Índices útiles
    CREATE INDEX IF NOT EXISTS idx_orden_cliente  ON orden(id_cliente);
    CREATE INDEX IF NOT EXISTS idx_orden_estado   ON orden(estado);
    CREATE INDEX IF NOT EXISTS idx_orden_empleado ON orden(id_empleado);
  seed.sql: |
